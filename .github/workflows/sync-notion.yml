name: Sync Notion → posts.json / projects.json

on:
  schedule:
    - cron: "0 * * * *" # 매시 정각 자동 동기화
  workflow_dispatch: {} # Actions 탭에서 "Run workflow" 수동 실행

# 자동 커밋을 위해 쓰기 권한 부여
permissions:
  contents: write

# 동시 실행 방지 (겹치면 최신 것만)
concurrency:
  group: sync-notion
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # @notionhq/client + undici(커넥션 풀 제어용) 가볍게 설치
      - name: Install dependencies
        run: npm install @notionhq/client@^2.2.15 undici --no-save

      - name: Sync posts from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: node scripts/sync-notion.mjs

      # 프로젝트 DB id는 스크립트에 기본값으로 들어 있어 별도 secret 불필요.
      # continue-on-error: integration 미연결 등으로 실패해도 글 동기화/커밋은 진행.
      - name: Sync projects from Notion
        continue-on-error: true
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PROJECTS_DB_ID: ${{ secrets.NOTION_PROJECTS_DB_ID }}
        run: node scripts/sync-projects.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json public/posts data/projects.json public/projects
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: Notion 글 동기화 (자동)"
            git push
          fi
